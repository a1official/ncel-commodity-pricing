services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ncel_commodity
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ncel_commodity
    depends_on:
      - db
      - redis

  # worker:
  #   build: ./backend
  #   command: python -m app.ingestion.orchestrator
  #   environment:
  #     - POSTGRES_SERVER=db
  #   depends_on:
  #     - db

volumes:
  postgres_data:
