services:
  # Backend FastAPI Service
  - type: web
    name: ncel-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ncel-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://your-frontend-link.onrender.com"
      - key: GROQ_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false

  # Frontend Next.js Service
  - type: web
    name: ncel-frontend
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://ncel-backend.onrender.com

databases:
  - name: ncel-db
    databaseName: commodity_db
    plan: free
